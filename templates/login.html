<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    
    <style>
        /* Resets basic margins so the background fills the screen */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* Light grey background */
        }

        /* 1. Page Wrapper (Centers everything on screen) */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. Login Card (The white box with the shadow) */
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            background: #ffffff;
        }

        /* 3. Text and Input Spacing */
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* 4. Submitting Button Polish */
        .submit-button {
            width: 100%;
            padding: 15px;
            background-color: #0d6efd; /* Nice blue color */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .submit-button:hover {
            background-color: #0b5ed7; /* Slightly darker blue on hover */
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .footer-link a {
            color: #0d6efd;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="login-card">
            <h1 class="login-title">🔒 Secure Login</h1>
            
            <form method="POST" action="/login">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••••" required>
                </div>
                
                <button type="submit" class="submit-button">Log In</button>
            </form>
            
            <p class="footer-link">No account? <a href="/register">Register here</a></p>
        </div>
    </div>

</body>
</html>
